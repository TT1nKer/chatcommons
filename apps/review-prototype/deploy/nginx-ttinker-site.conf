server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ttinker.dev;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/ttinker/acme;
        default_type text/plain;
    }

    location / {
        return 301 https://ttinker.dev$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name ttinker.dev;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/ttinker.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ttinker.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location = / {
        default_type text/plain;
        return 200 "ttinker\n";
    }

    location = /chatcommons {
        return 302 /chatcommons/;
    }

    location ^~ /chatcommons/api/ {
        proxy_pass http://127.0.0.1:8091/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        client_max_body_size 2m;
        access_log off;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    location ^~ /chatcommons/ {
        alias /var/www/ttinker/chatcommons/current/public/;
        index index.html;
        access_log off;
        limit_except GET { deny all; }

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header Cache-Control "private, no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    }

    location / {
        return 404;
    }
}
