<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>kaiyuan · 评审收件箱</title>
    <link rel="stylesheet" href="./admin.css" />
    <script defer src="./admin.js"></script>
  </head>
  <body>
    <header class="admin-header"><div class="admin-brand"><span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span><div><p>kaiyuan 原型</p><h1>评审收件箱</h1></div></div><button type="button" id="refresh">刷新</button></header>
    <main>
      <section class="summary" aria-label="意见统计"><div><strong id="pending-count">0</strong><span>待处理</span></div><div><strong id="review-count">0</strong><span>待验收</span></div><div><strong id="total-count">0</strong><span>全部意见</span></div></section>
      <p class="error" id="admin-error" hidden></p>
      <section class="inbox" id="inbox" aria-live="polite"><p class="empty">正在读取意见……</p></section>
    </main>
  </body>
</html>
